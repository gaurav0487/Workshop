<!doctype html>
<!-- All-in-one spectator page: cast view on top, bot cameras below.
     Open via http://localhost:8888/watch.html?viewers=4007,4008
     compete.sh prints the right URL. -->
<meta charset="utf-8">
<title>Agent Battle — Diamond Leaderboard</title>
<style>
  body { margin: 0; background: #0d0d0f; font-family: system-ui, sans-serif; }
  .top { height: 56vh; border: 0; width: 100%; display: block; }
  .grid { display: grid; gap: 4px; padding: 4px; height: 44vh;
          grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
  .cam { position: relative; background: #000; border-radius: 6px; overflow: hidden; }
  .cam iframe { width: 100%; height: 100%; border: 0; }
  .cam .label { position: absolute; top: 6px; left: 8px; padding: 2px 8px;
                background: rgba(0,0,0,.6); color: #fff; font-size: 12px;
                border-radius: 4px; letter-spacing: .5px; }
  .empty { color: #888; padding: 2rem; text-align: center; }
</style>
<iframe class="top" src="/?cast=1"></iframe>
<div class="grid" id="grid"><div class="empty">No viewers — pass ?viewers=4007,4008</div></div>
<script>
  const ports = (new URLSearchParams(location.search).get('viewers') || '')
    .split(',').map(s => parseInt(s, 10)).filter(n => Number.isInteger(n) && n > 0 && n < 65536);
  if (ports.length) {
    document.getElementById('grid').innerHTML = ports.map((p, i) =>
      `<div class="cam"><span class="label">:${p}</span>` +
      `<iframe src="http://localhost:${p}/"></iframe></div>`
    ).join('');
  }
</script>
