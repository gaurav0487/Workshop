<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Battle — Diamond Leaderboard</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%92%8E%3C/text%3E%3C/svg%3E">
</head>
<body>

  <!-- ════════ LOGIN SCREEN ════════ -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-logo">
        <div style="font-size:48px;line-height:1;margin-bottom:0.25rem">💎</div>
        <h1>Claude Code Workshop</h1>
        <p>A step-by-step Claude Code guide using a full-stack inventory management application</p>
      </div>

      <div class="login-card">
        <h2>Join the Workshop</h2>
        <form id="login-form">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="login-name" placeholder="e.g., Jane Smith" required autocomplete="off">
          </div>
          <div class="form-group">
            <label>Workshop Code</label>
            <input type="text" id="login-workshop" placeholder="e.g., aws-summit-ny" required autocomplete="off">
          </div>
          <div class="login-error" id="login-error"></div>
          <button type="submit" class="btn btn-primary" id="login-btn">
            Enter Workshop
          </button>
        </form>
      </div>

    </div>
  </div>

  <!-- ════════ APP SHELL ════════ -->
  <div id="app-shell" class="app-shell">

    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/></svg>
    </button>
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <span style="font-size:24px;line-height:1">💎</span>
          <div class="sidebar-brand-text">
            <h2>Claude Code</h2>
            <span>Workshop</span>
          </div>
        </div>
        <div id="workshop-alias-display" style="display:none;margin-top:0.5rem;padding:0.25rem 0.6rem;background:var(--sidebar-hover, rgba(255,255,255,0.08));border-radius:6px;font-size:0.75rem;color:var(--light-gray, #aaa);font-family:monospace;text-align:center"></div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="workshop" onclick="App.navigate('workshop')">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H5a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V6a1 1 0 00-1-1zM15 5h-1a1 1 0 00-1 1v4a1 1 0 001 1h1a1 1 0 001-1V6a1 1 0 00-1-1zM9 13H5a1 1 0 00-1 1v1a1 1 0 001 1h4a1 1 0 001-1v-1a1 1 0 00-1-1zM15 13h-1a1 1 0 00-1 1v1a1 1 0 001 1h1a1 1 0 001-1v-1a1 1 0 00-1-1z"/></svg>
          Workshop
        </button>
        <button class="nav-item" data-view="leaderboard" onclick="App.navigate('leaderboard')">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15V9M8 15V5M12 15V9M16 15V7"/></svg>
          Leaderboard
        </button>
        <div class="nav-divider"></div>
        <button class="nav-item" data-view="admin" onclick="App.navigate('admin')">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z" transform="translate(-2 -2) scale(0.85)"/><circle cx="10" cy="10" r="2.5" transform="translate(-2 -2) scale(0.85)"/></svg>
          Admin
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar"></div>
          <div class="user-details">
            <div class="name" id="user-name-display"></div>
            <div class="points" id="user-points-display">0 pts</div>
          </div>
          <button class="logout-btn" onclick="App.logout()" title="Log out">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17H4a1 1 0 01-1-1V4a1 1 0 011-1h3M14 14l4-4-4-4M18 10H7"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content" id="main-content">
      <!-- Views are rendered here by JS -->
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <div class="clawd-celebration" id="clawd-celebration" style="display:none"></div>

  <script src="/js/tasks-data.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
